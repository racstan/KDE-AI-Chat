name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: |
          python3 -m py_compile org.kde.plasma.kdeaichat/contents/scripts/kde-ai-scheduler.py
          python3 -m py_compile org.kde.plasma.kdeaichat/contents/ui/doc_extractor.py
      - name: Lint
        run: pipx run ruff check --select=E9,F --output-format=github org.kde.plasma.kdeaichat/contents/scripts/kde-ai-scheduler.py org.kde.plasma.kdeaichat/contents/ui/doc_extractor.py
      - name: Run unit tests
        run: |
          pip install pytest
          pytest tests/ -v

  qml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install qmllint
        run: sudo apt-get update && sudo apt-get install -y qml6-module-qtquick qml6-module-qtquick-controls qml6-module-qtquick-layouts qml6-module-qtquick-dialogs qt6-declarative-tools
      - name: Lint QML
        working-directory: org.kde.plasma.kdeaichat/contents/ui
        run: |
          for f in *.qml; do
            echo "Checking $f..."
            qmllint --nowarnings $f 2>&1 || true
          done
      - name: Install QtTest
        run: sudo apt-get install -y qml6-module-qtquick-test 2>&1 || echo "QtTest not available — skipping"
      - name: Run QML tests
        working-directory: org.kde.plasma.kdeaichat/contents/ui
        run: |
          if command -v qmltestrunner6 &>/dev/null; then
            qmltestrunner6 -input ../../../tests -o -,txt || echo "Some QML tests failed"
          elif command -v qmltestrunner &>/dev/null; then
            qmltestrunner -input ../../../tests -o -,txt || echo "Some QML tests failed"
          else
            echo "qmltestrunner/qmltestrunner6 not available — skipping"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check YAML
        run: |
          pipx install yamllint
          yamllint -d '{extends: relaxed, rules: {line-length: disable}}' .github/workflows/ci.yml
      - name: Check Markdown
        run: |
          pipx install markdownlint-cli
          markdownlint --ignore node_modules '**/*.md' 2>&1 || true
